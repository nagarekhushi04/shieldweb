<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 60" fill="none">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef233c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9184a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Icon -->
  <g transform="translate(5, 5)">
    <!-- Outer Shield -->
    <path d="M25 2 L45 2 L45 18 C45 30 37 38 25 42 C13 38 5 30 5 18 L5 2 Z" 
          fill="url(#shieldGradient)" 
          stroke="#ef233c" 
          stroke-width="2"/>
    
    <!-- Inner Shield Pattern -->
    <path d="M25 7 L40 7 L40 19 C40 27 34 33 25 36 C16 33 10 27 10 19 L10 7 Z" 
          fill="none" 
          stroke="#f5f5f5" 
          stroke-width="1.5" 
          opacity="0.3"/>
    
    <!-- Lock Symbol -->
    <g transform="translate(17, 14)">
      <!-- Lock Body -->
      <rect x="4" y="7" width="8" height="6" rx="1" fill="#f5f5f5"/>
      <!-- Lock Shackle -->
      <path d="M6 7 L6 4 C6 2 7 1 8 1 C9 1 10 2 10 4 L10 7" 
            fill="none" 
            stroke="#f5f5f5" 
            stroke-width="2" 
            stroke-linecap="round"/>
      <!-- Keyhole -->
      <circle cx="8" cy="9" r="1.5" fill="#ef233c"/>
    </g>
    
    <!-- Blockchain Nodes -->
    <circle cx="13" cy="28" r="2.5" fill="#f5f5f5" opacity="0.6"/>
    <circle cx="25" cy="30" r="2.5" fill="#f5f5f5" opacity="0.6"/>
    <circle cx="37" cy="28" r="2.5" fill="#f5f5f5" opacity="0.6"/>
    <line x1="15.5" y1="28" x2="22.5" y2="29" stroke="#f5f5f5" stroke-width="1.5" opacity="0.4"/>
    <line x1="27.5" y1="30" x2="34.5" y2="28" stroke="#f5f5f5" stroke-width="1.5" opacity="0.4"/>
  </g>
</svg>
