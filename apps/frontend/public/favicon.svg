<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="shieldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ef233c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9184a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Shield Icon -->
  <g transform="translate(3, 3)">
    <!-- Outer Shield -->
    <path d="M13 1 L23 1 L23 9 C23 15 19 19 13 21 C7 19 3 15 3 9 L3 1 Z" 
          fill="url(#shieldGradient)" 
          stroke="#ef233c" 
          stroke-width="1"/>
    
    <!-- Inner Shield Pattern -->
    <path d="M13 3.5 L20.5 3.5 L20.5 9.5 C20.5 13.5 17.5 16.5 13 18 C8.5 16.5 5.5 13.5 5.5 9.5 L5.5 3.5 Z" 
          fill="none" 
          stroke="#f5f5f5" 
          stroke-width="0.8" 
          opacity="0.3"/>
    
    <!-- Lock Symbol -->
    <g transform="translate(9, 7)">
      <!-- Lock Body -->
      <rect x="2" y="3.5" width="4" height="3" rx="0.5" fill="#f5f5f5"/>
      <!-- Lock Shackle -->
      <path d="M3 3.5 L3 2 C3 1 3.5 0.5 4 0.5 C4.5 0.5 5 1 5 2 L5 3.5" 
            fill="none" 
            stroke="#f5f5f5" 
            stroke-width="1" 
            stroke-linecap="round"/>
      <!-- Keyhole -->
      <circle cx="4" cy="4.5" r="0.5" fill="#ef233c"/>
    </g>
    
    <!-- Blockchain Nodes -->
    <circle cx="7" cy="14" r="1" fill="#f5f5f5" opacity="0.6"/>
    <circle cx="13" cy="15" r="1" fill="#f5f5f5" opacity="0.6"/>
    <circle cx="19" cy="14" r="1" fill="#f5f5f5" opacity="0.6"/>
    <line x1="8" y1="14" x2="12" y2="14.5" stroke="#f5f5f5" stroke-width="0.5" opacity="0.4"/>
    <line x1="14" y1="15" x2="18" y2="14" stroke="#f5f5f5" stroke-width="0.5" opacity="0.4"/>
  </g>
</svg>